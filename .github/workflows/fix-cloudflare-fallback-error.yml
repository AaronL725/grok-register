name: One-shot Cloudflare fallback error fix

on:
  pull_request:
    branches: [main]
    paths:
      - tools/apply_cloudflare_fallback_error_fix.py
      - .github/workflows/fix-cloudflare-fallback-error.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply scoped patch
        run: python tools/apply_cloudflare_fallback_error_fix.py

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run focused tests
        run: python -m unittest tests.test_cloudflare_admin_api

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: preserve Cloudflare fallback errors"
          git push origin HEAD:${{ github.head_ref }}
