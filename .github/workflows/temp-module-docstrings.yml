name: Temporary module docstring refresh

on:
  pull_request:
    branches: [main]
    paths:
      - tools/update_module_docstrings.py
      - .github/workflows/temp-module-docstrings.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          show-progress: false
      - name: Publish tracked Python inventory
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY' > /tmp/python-inventory.txt
          import subprocess
          files = subprocess.check_output(["git", "ls-files", "*.py"], text=True).splitlines()
          print("Tracked Python files:\n\n```text")
          print("\n".join(files))
          print("```")
          PY
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/python-inventory.txt
          exit 1
