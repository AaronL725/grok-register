name: Temporary module docstring refresh

on:
  pull_request:
    branches: [main]
    paths:
      - tools/update_module_docstrings.py
      - .github/workflows/temp-module-docstrings.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 1
          show-progress: false
      - name: Show tracked Python inventory
        run: |
          python3 - <<'PY'
          import subprocess
          files = subprocess.check_output(["git", "ls-files", "*.py"], text=True).splitlines()
          print("PYFILES=" + repr(files))
          raise SystemExit(1)
          PY
