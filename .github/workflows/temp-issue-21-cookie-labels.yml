name: Temporary issue 21 cookie labels

on:
  pull_request:
    branches: [main]
    paths:
      - tools/apply_issue_21_cookie_labels.py
      - .github/workflows/temp-issue-21-cookie-labels.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - name: Apply exact issue 21 patch
        run: |
          python3 -m py_compile tools/apply_issue_21_cookie_labels.py
          python3 tools/apply_issue_21_cookie_labels.py
          python3 -m py_compile cpa_xai/browser_confirm.py
          git diff --check
          test "$(git diff --name-only | wc -l)" -eq 1
          test "$(git diff --name-only)" = "cpa_xai/browser_confirm.py"
      - name: Commit verified target file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cpa_xai/browser_confirm.py
          git diff --cached --check
          git commit -m "fix: recognize current cookie consent labels"
          git push origin HEAD:${{ github.head_ref }}
